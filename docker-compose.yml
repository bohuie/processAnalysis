services:
  app:
    build: .
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - AI_MODE=offline
      - OUTPUT_ROOT=/app/data/outputs
      - OLLAMA_HOST=http://llm:11434
      - API_KEY=dev-secret-key
    depends_on:
      - llm
    volumes:
      - ./data:/app/data

  llm:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: