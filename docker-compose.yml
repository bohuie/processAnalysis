services:
  app:
    build: .
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://app:app@db:5432/graphs
      - AI_MODE=offline
      - OUTPUT_ROOT=/app/data/outputs
      - OLLAMA_HOST=http://llm:11434
    depends_on:
      - db
      - llm
    volumes:
      - ./data:/app/data

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_DB=graphs
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  llm:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  db_data:
  ollama_data:
